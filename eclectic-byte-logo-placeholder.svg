<svg xmlns="http://www.w3.org/2000/svg" width="720" height="240" viewBox="0 0 720 240" role="img" aria-labelledby="title desc">
  <title id="title">Eclectic Byte placeholder logo</title>
  <desc id="desc">A placeholder wordmark with an EB monogram inside a rounded square.</desc>
  <defs>
    <linearGradient id="markGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef7d42" />
      <stop offset="100%" stop-color="#bc4728" />
    </linearGradient>
  </defs>
  <rect width="720" height="240" rx="36" fill="#f7f4ec" />
  <rect x="36" y="36" width="168" height="168" rx="42" fill="url(#markGradient)" />
  <text x="120" y="138" text-anchor="middle" font-family="Space Grotesk, Arial, sans-serif" font-size="68" font-weight="700" letter-spacing="4" fill="#ffffff">EB</text>
  <text x="242" y="115" font-family="Space Grotesk, Arial, sans-serif" font-size="52" font-weight="700" letter-spacing="5" fill="#0f1720">ECLECTIC BYTE</text>
  <text x="244" y="156" font-family="Space Grotesk, Arial, sans-serif" font-size="22" font-weight="500" letter-spacing="3" fill="#52606d">placeholder wordmark for repository use</text>
</svg>
