<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Eclectic Byte social card</title>
  <desc id="desc">A social preview image for Eclectic Byte and the Video Compressor product.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3ecda" />
      <stop offset="100%" stop-color="#fdfbf6" />
    </linearGradient>
    <linearGradient id="mark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef7d42" />
      <stop offset="100%" stop-color="#bc4728" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="150" cy="88" r="180" fill="#ef7d42" opacity="0.12" />
  <rect x="70" y="60" width="104" height="104" rx="28" fill="url(#mark)" />
  <text x="122" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" font-weight="700" letter-spacing="4" fill="#ffffff">EB</text>
  <text x="208" y="126" font-family="Arial, sans-serif" font-size="36" font-weight="700" letter-spacing="4" fill="#0f1720">ECLECTIC BYTE</text>
  <text x="70" y="252" font-family="Georgia, serif" font-size="98" fill="#0f1720">Focused software.</text>
  <text x="70" y="350" font-family="Georgia, serif" font-size="98" fill="#0f1720">Clear product surfaces.</text>
  <rect x="720" y="170" width="390" height="280" rx="34" fill="#ffffff" opacity="0.88" stroke="#e8dcc7" />
  <text x="760" y="228" font-family="Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="4" fill="#bc4728">CURRENT FOCUS</text>
  <text x="760" y="302" font-family="Georgia, serif" font-size="56" fill="#0f1720">Video Compressor</text>
  <text x="760" y="362" font-family="Arial, sans-serif" font-size="30" fill="#52606d">Legal pages and company site</text>
  <text x="760" y="405" font-family="Arial, sans-serif" font-size="30" fill="#52606d">ready to extend with product URLs.</text>
</svg>
